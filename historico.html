<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SI – Histórico</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-painel.css"/>
  <link rel="stylesheet" href="historico.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="ring">
        <div class="logo-ring">
        <img src="Logo.png" alt="SI – Suanderson Informática"/>
      </div>
      </div>
      <div>
        <span class="sidebar-brand">SI</span>
        <small>Suanderson Informática</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="admin-painel.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Ordens de Serviço
      </a>
      <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Dashboard
      </a>
      <a class="nav-item active" href="historico.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Histórico
      </a>
      <a class="nav-item" href="index.html" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Ver site cliente
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-sair" onclick="sair()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <main class="painel-main">

    <div class="topbar">
      <div>
        <h1>Histórico Interno</h1>
        <p class="hist-subtitle">Linha do tempo por ordem de serviço</p>
      </div>
    </div>

    <div class="hist-busca-wrap">
      <div class="hist-busca-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="busca-os"
          type="text"
          placeholder="Buscar por número da OS... Ex: 1 ou 00001"
          oninput="filtrarHistorico()"
          autocomplete="off"
        />
        <button class="btn-limpar-busca" id="btn-limpar" onclick="limparBusca()" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="hist-conteudo">
      <div class="hist-loading">
        <div class="spinner-hist"></div>
        <p>Carregando histórico...</p>
      </div>
    </div>

  </main>

  <script src="historico.js"></script>
</body>
</html>
