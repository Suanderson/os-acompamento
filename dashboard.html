<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SI – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-painel.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <!-- SIDEBAR (igual ao painel) -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="ring">
        <div class="logo-ring">
        <img src="Logo.png" alt="SI – Suanderson Informática"/>
      </div>
      </div>
      <div>
        <span class="sidebar-brand">SI</span>
        <small>Suanderson Informática</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" href="admin-painel.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Ordens de Serviço
      </a>
      <a class="nav-item active" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Dashboard
      </a>
      <a class="nav-item" href="historico.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Histórico
      </a>
      <a class="nav-item" href="index.html" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver site cliente
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-sair" onclick="sair()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="painel-main">

    <div class="topbar">
      <div>
        <h1>Dashboard</h1>
        <p class="dash-subtitle" id="dash-periodo">Carregando...</p>
      </div>
      <button class="btn-atualizar" onclick="carregarDashboard()">
        <svg id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Atualizar
      </button>
    </div>

    <!-- CARDS DE INDICADORES -->
    <div class="dash-cards" id="dash-cards">
      <!-- preenchido via JS -->
      <div class="dash-card-skeleton"></div>
      <div class="dash-card-skeleton"></div>
      <div class="dash-card-skeleton"></div>
      <div class="dash-card-skeleton"></div>
      <div class="dash-card-skeleton"></div>
    </div>

    <!-- LINHA INFERIOR: gráfico de status + OS recentes -->
    <div class="dash-bottom">

      <!-- DISTRIBUIÇÃO POR STATUS -->
      <div class="dash-section">
        <p class="dash-section-title">Distribuição por Status</p>
        <div class="status-bars" id="status-bars">
          <div class="dash-card-skeleton" style="height:180px"></div>
        </div>
      </div>

      <!-- OS RECEBIDAS HOJE -->
      <div class="dash-section">
        <p class="dash-section-title">Recebidas Hoje</p>
        <div class="os-hoje-lista" id="os-hoje-lista">
          <div class="dash-card-skeleton" style="height:180px"></div>
        </div>
      </div>

    </div>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
